name: Grow Starfall Crown world

on:
  schedule:
    # GitHub cron uses UTC. Because this runs every hour, minute 17 is the
    # same cadence in Taiwan and avoids the busiest top-of-hour queue.
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: starfall-crown-hourly-story
  cancel-in-progress: false

env:
  TZ: Asia/Taipei

jobs:
  grow-story:
    if: github.repository == '2lll5/AutoRPG'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore the verified sword-and-sorcery world
        run: node .fantasy-update/restore.mjs

      - name: Generate this hour's fantasy continuation
        run: node scripts/generate-story.mjs

      - name: Validate generated world data
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const file = 'public/story.generated.json';
          const data = JSON.parse(fs.readFileSync(file, 'utf8'));

          if (data.schema !== 4) {
            throw new Error(`Expected fantasy story schema 4, received ${data.schema}`);
          }
          if (!Array.isArray(data.epochs) || data.epochs.length === 0) {
            throw new Error('Generated story contains no fate-tide epochs.');
          }
          if (!data.generatedAt || !data.entryEpochId) {
            throw new Error('Generated story is missing generatedAt or entryEpochId.');
          }

          const latest = data.epochs.at(-1);
          console.log(`Validated ${data.epochs.length} fate tides; latest=${latest.id}; finale=${Boolean(latest.finale)}`);
          NODE

      - name: Commit and push the new continuation
        shell: bash
        run: |
          git config user.name "Starfall Crown Storyteller"
          git config user.email "actions@users.noreply.github.com"
          git add public/story.generated.json

          if git diff --cached --quiet; then
            echo "No new continuation is required for this hour."
            exit 0
          fi

          git commit -m "story: add hourly Starfall Crown continuation"

          # Retry around an occasional concurrent commit to main.
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              echo "Hourly continuation committed successfully."
              exit 0
            fi
            echo "Push attempt ${attempt} failed; retrying..."
            sleep $((attempt * 5))
          done

          echo "Unable to push the hourly continuation after three attempts."
          exit 1
