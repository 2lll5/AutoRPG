name: Grow Starfall Crown world

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: starfall-crown-hourly-story
  cancel-in-progress: false

jobs:
  grow-story:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore the sword-and-sorcery world
        run: tar -xzf .fantasy-update/update.tar.gz

      - name: Generate this hour's fantasy event layer
        run: node scripts/generate-story.mjs

      - name: Commit the new world event layer
        shell: bash
        run: |
          git config user.name "Starfall Crown Storyteller"
          git config user.email "actions@users.noreply.github.com"
          git add public/story.generated.json
          if git diff --cached --quiet; then
            echo "No world event update for this hour."
            exit 0
          fi
          git commit -m "story: expand the sword-and-sorcery world"
          git push
