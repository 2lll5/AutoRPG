name: Apply sword and sorcery rewrite

# Existing workflow update intentionally triggers the one-time rewrite.
on:
  push:
    branches: [main]
    paths:
      - '.fantasy-update/update.tar.gz'
      - '.github/workflows/apply-fantasy.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-rewrite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify rewrite archive
        run: echo '6fe3c85f243ca6ff00c3644d374a04709b5a9a78bc0e229439b99ebf47e22276  .fantasy-update/update.tar.gz' | sha256sum --check --strict

      - name: Apply fantasy world files
        run: tar -xzf .fantasy-update/update.tar.gz -C .

      - name: Validate JavaScript modules
        run: |
          node --check lib/story.js
          node --check lib/runtimeStory.js
          node --check scripts/generate-story.mjs

      - name: Commit sword and sorcery world
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md app/layout.js app/globals.css components/Game.jsx lib/story.js lib/runtimeStory.js public/story.generated.json scripts/generate-story.mjs
          if git diff --cached --quiet; then
            echo 'No rewrite changes to commit.'
            exit 0
          fi
          git commit -m 'Rebuild AutoRPG as sword-and-sorcery world'
          git push
