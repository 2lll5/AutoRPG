name: Bootstrap AutoRPG project

on:
  push:
    paths:
      - ".bootstrap/**"
      - ".github/workflows/bootstrap.yml"
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore project archive
        shell: bash
        run: |
          cat .bootstrap/part* > /tmp/autorpg.tar.gz.b64
          base64 --decode /tmp/autorpg.tar.gz.b64 > /tmp/autorpg.tar.gz
          tar -xzf /tmp/autorpg.tar.gz
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap.yml

      - name: Commit full project
        shell: bash
        run: |
          git config user.name "AutoRPG Bootstrap"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Build illustrated branching AutoRPG"
          git push
